{% extends "layouts/base.html" %}

{% block content %}
<div class="min-h-screen bg-gray-50/50 py-12 px-4">
    <div class="max-w-2xl mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <a href="{{ url_for('parking.index') }}" class="h-10 w-10 flex items-center justify-center rounded-full bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-all shadow-sm">
                <i class="fas fa-chevron-left"></i>
            </a>
            <div>
                <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Configurar Estacionamientos</h2>
                <p class="text-gray-500">Define la estructura de filas y columnas por piso.</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden">
            <div class="p-8">
                <form method="POST" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700 ml-1">Piso / Nivel</label>
                            <input type="text" name="floor" placeholder="Ej: P1 o Sub-1" required 
                                   class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-4 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700 ml-1">Sector / Letra</label>
                            <input type="text" name="sector" placeholder="Ej: A, B, Norte" required
                                   class="w-full bg-gray-50 border border-gray-200 rounded-2xl px-4 py-4 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all">
                        </div>
                    </div>

                    <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100 space-y-4">
                        <h3 class="font-bold text-blue-800 flex items-center gap-2">
                            <i class="fas fa-th"></i> Dimensiones de la Matriz
                        </h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-blue-600 uppercase ml-1">Filas (Vertical)</label>
                                <input type="number" name="rows" value="5" min="1" max="20" required
                                       class="w-full bg-white border border-blue-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all font-bold text-lg">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-blue-600 uppercase ml-1">Columnas (Horizontal)</label>
                                <input type="number" name="cols" value="8" min="1" max="50" required
                                       class="w-full bg-white border border-blue-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all font-bold text-lg">
                            </div>
                        </div>
                        <p class="text-[10px] text-blue-500 italic">Esto creará automáticamente los espacios y los posicionará en el mapa.</p>
                    </div>

                    <div class="space-y-3">
                        <label class="text-sm font-semibold text-gray-700 ml-1 block">Tipo de espacios a generar</label>
                        <div class="grid grid-cols-2 gap-3">
                            <label class="relative flex items-center p-4 border rounded-2xl cursor-pointer hover:bg-gray-50 transition-all has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                                <input type="radio" name="spot_type" value="regular" checked class="hidden">
                                <div class="flex items-center gap-3">
                                    <div class="h-4 w-4 rounded-full border-2 border-gray-300 flex items-center justify-center">
                                        <div class="h-2 w-2 rounded-full bg-blue-500 scale-0 transition-transform"></div>
                                    </div>
                                    <span class="text-sm font-medium">Regular / Residente</span>
                                </div>
                            </label>
                            <label class="relative flex items-center p-4 border rounded-2xl cursor-pointer hover:bg-gray-50 transition-all has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                                <input type="radio" name="spot_type" value="visitor" class="hidden">
                                <div class="flex items-center gap-3">
                                    <div class="h-4 w-4 rounded-full border-2 border-gray-300 flex items-center justify-center">
                                        <div class="h-2 w-2 rounded-full bg-blue-500 scale-0 transition-transform"></div>
                                    </div>
                                    <span class="text-sm font-medium">Visitas</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 pt-6 border-t border-gray-100">
                        <button type="submit" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            <i class="fas fa-magic"></i> Generar Estacionamientos
                        </button>
                        <a href="{{ url_for('parking.index') }}" class="flex-1 bg-white text-gray-600 border border-gray-200 py-4 rounded-2xl font-bold text-center hover:bg-gray-50 transition-all">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Estilo para el radio button personalizado */
    input[type="radio"]:checked + div .h-2 { scale: 1 !important; }
</style>
{% endblock %}
