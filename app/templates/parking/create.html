{% extends "layouts/base.html" %}

{% block content %}
<div class="min-h-screen bg-gray-50/50 py-12 px-4">
    <div class="max-w-2xl mx-auto">
        <div class="flex items-center gap-4 mb-8">
            <a href="{{ url_for('parking.index') }}" class="h-10 w-10 flex items-center justify-center rounded-full bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-all shadow-sm">
                <i class="fas fa-chevron-left"></i>
            </a>
            <div>
                <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Nuevo Espacio</h2>
                <p class="text-gray-500">Registra un nuevo lugar en el mapa de estacionamientos.</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden">
            <div class="p-8">
                <form method="POST" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700 ml-1">Número de Espacio</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                                    <i class="fas fa-hashtag"></i>
                                </span>
                                <input type="text" name="spot_number" placeholder="Ej: A-101" required
                                       class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all placeholder:text-gray-400">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700 ml-1">Piso / Nivel</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                                    <i class="fas fa-layer-group"></i>
                                </span>
                                <input type="text" name="floor" placeholder="Ej: 1" required
                                       class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all">
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <label class="text-sm font-semibold text-gray-700 ml-1">Tipo de Estacionamiento</label>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <label class="relative flex cursor-pointer">
                                <input type="radio" name="spot_type" value="normal" class="peer sr-only" checked>
                                <div class="w-full p-4 text-center bg-gray-50 border border-gray-200 rounded-2xl hover:bg-gray-100 peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 transition-all">
                                    <i class="fas fa-car mb-2 text-xl block"></i>
                                    <span class="text-xs font-bold uppercase tracking-wider">Estándar</span>
                                </div>
                            </label>

                            <label class="relative flex cursor-pointer">
                                <input type="radio" name="spot_type" value="disabled" class="peer sr-only">
                                <div class="w-full p-4 text-center bg-gray-50 border border-gray-200 rounded-2xl hover:bg-gray-100 peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 transition-all">
                                    <i class="fas fa-wheelchair mb-2 text-xl block"></i>
                                    <span class="text-xs font-bold uppercase tracking-wider">PMR</span>
                                </div>
                            </label>

                            <label class="relative flex cursor-pointer">
                                <input type="radio" name="spot_type" value="ev" class="peer sr-only">
                                <div class="w-full p-4 text-center bg-gray-50 border border-gray-200 rounded-2xl hover:bg-gray-100 peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 transition-all">
                                    <i class="fas fa-bolt mb-2 text-xl block"></i>
                                    <span class="text-xs font-bold uppercase tracking-wider">Eléctrico</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="bg-amber-50 border border-amber-100 p-4 rounded-2xl flex gap-3 items-start">
                        <i class="fas fa-info-circle text-amber-500 mt-1"></i>
                        <p class="text-xs text-amber-700 leading-relaxed">
                            Al crear un nuevo espacio, su estado inicial será <strong>"Disponible"</strong> y podrá visualizarse inmediatamente en el mapa general.
                        </p>
                    </div>

                    <div class="flex flex-col sm:flex-row gap-3 pt-4 border-t border-gray-100">
                        <button type="submit" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            <i class="fas fa-save"></i> Guardar Espacio
                        </button>
                        <a href="{{ url_for('parking.index') }}" class="flex-1 bg-white text-gray-600 border border-gray-200 py-4 rounded-2xl font-bold text-center hover:bg-gray-50 transition-all">
                            Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
