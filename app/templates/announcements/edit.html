{% extends "layouts/base.html" %}

{% block title %}Editar Anuncio - Condo Admin{% endblock %}

{% block content %}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<div class="min-h-screen bg-gray-50 py-8">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div class="bg-gradient-to-r from-blue-50 to-indigo-50 px-6 py-6 border-b border-gray-200">
                <div class="flex items-center">
                    <svg class="w-6 h-6 text-blue-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                    </svg>
                    <h1 class="text-2xl font-bold text-gray-900">Editar Anuncio</h1>
                </div>
            </div>

            <div class="p-6">
                <form method="POST" action="{{ url_for('announcements.edit', announcement_id=announcement.id) }}" class="space-y-6" id="edit-form">
                    <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                        <div class="sm:col-span-4">
                            <label for="title" class="block text-sm font-medium text-gray-700">Título del Anuncio</label>
                            <input type="text" name="title" id="title" value="{{ announcement.title }}" required
                                   class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                        </div>

                        <div class="sm:col-span-3">
                            <label for="priority" class="block text-sm font-medium text-gray-700">Prioridad</label>
                            <select id="priority" name="priority" 
                                    class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md">
                                <option value="information" {% if announcement.priority == 'information' %}selected{% endif %}>Informativo</option>
                                <option value="normal" {% if announcement.priority == 'normal' %}selected{% endif %}>Normal</option>
                                <option value="urgent" {% if announcement.priority == 'urgent' %}selected{% endif %}>Urgente</option>
                            </select>
                        </div>

                        <div class="sm:col-span-3">
                            <label for="category" class="block text-sm font-medium text-gray-700">Categoría</label>
                            <select id="category" name="category" 
                                    class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md">
                                <option value="Aviso" {% if announcement.category == 'Aviso' %}selected{% endif %}>Aviso</option>
                                <option value="Mantenimiento" {% if announcement.category == 'Mantenimiento' %}selected{% endif %}>Mantenimiento</option>
                                <option value="Seguridad" {% if announcement.category == 'Seguridad' %}selected{% endif %}>Seguridad</option>
                                <option value="Finanzas" {% if announcement.category == 'Finanzas' %}selected{% endif %}>Finanzas</option>
                                <option value="Evento" {% if announcement.category == 'Evento' %}selected{% endif %}>Evento</option>
                            </select>
                        </div>

                        <div class="sm:col-span-6">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Contenido</label>
                            <textarea id="content" name="content" class="hidden">{{ announcement.content }}</textarea>
                            <div class="bg-white border border-gray-300 rounded-md">
                                <div id="editor-container" style="height: 300px;">
                                    {{ announcement.content|safe }}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="pt-5 flex items-center justify-end space-x-3 border-t border-gray-200">
                        <a href="{{ url_for('announcements.detail', announcement_id=announcement.id) }}" 
                           class="inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                            Cancelar
                        </a>
                        <button type="submit" 
                                class="inline-flex items-center px-6 py-2 border border-transparent rounded-lg text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 shadow-sm transition-colors">
                            Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script>
    var quill = new Quill('#editor-container', {
        theme: 'snow',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['clean']
            ]
        }
    });

    document.getElementById('edit-form').onsubmit = function() {
        document.querySelector('#content').value = quill.root.innerHTML;
    };
</script>
{% endblock %}
