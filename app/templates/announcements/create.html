{% extends "layouts/base.html" %}

{% block title %}Crear Anuncio - Condo Admin{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 py-8 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto">
        <div class="bg-white shadow-lg rounded-lg overflow-hidden border border-gray-200">
            
            <div class="bg-indigo-600 px-6 py-4">
                <h2 class="text-xl font-bold text-white flex items-center">
                    <i class="fas fa-bullhorn mr-3"></i>
                    Crear Nuevo Anuncio
                </h2>
            </div>

            <div class="p-6">
                <form method="POST" action="{{ url_for('announcements.create') }}" class="space-y-6" id="announcement-form">
                    
                    <div>
                        <label for="title" class="block text-sm font-medium text-gray-700 mb-1">Título *</label>
                        <input type="text" id="title" name="title" required maxlength="200"
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
                            placeholder="Ej: Mantenimiento de Ascensores">
                    </div>

                    <!-- EDITOR DE TEXTO ENRIQUECIDO -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Contenido *</label>
                        <!-- Contenedor del Editor Quill -->
                        <div id="editor-container" class="bg-white border border-gray-300 rounded-md" style="min-height: 250px;"></div>
                        <!-- Input oculto para enviar el HTML al servidor -->
                        <input type="hidden" name="content" id="content-input" required>
                        <p class="text-xs text-gray-500 mt-1">Usa la barra de herramientas para dar formato al texto</p>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label for="priority" class="block text-sm font-medium text-gray-700 mb-1">Prioridad</label>
                            <select id="priority" name="priority" 
                                class="w-full px-4 py-2 border border-gray-300 rounded-md bg-white focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                                <option value="normal">Normal</option>
                                <option value="urgente">Urgente</option>
                                <option value="informacion">Informativo</option>
                            </select>
                        </div>

                        <div>
                            <label for="category" class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
                            <select id="category" name="category"
                                class="w-full px-4 py-2 border border-gray-300 rounded-md bg-white focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                                <option value="Aviso">Aviso</option>
                                <option value="Mantenimiento">Mantenimiento</option>
                                <option value="Evento">Evento</option>
                                <option value="Emergencia">Emergencia</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label for="affected_area" class="block text-sm font-medium text-gray-700 mb-1">Área Afectada (opcional)</label>
                        <input type="text" id="affected_area" name="affected_area"
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                            placeholder="Ej: Torre B, Piscina, Todo el edificio">
                    </div>

                    <div>
                        <label for="expiry_date" class="block text-sm font-medium text-gray-700 mb-1">Fecha de Expiración (opcional)</label>
                        <input type="date" id="expiry_date" name="expiry_date"
                            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" id="is_published" name="is_published" checked
                            class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                        <label for="is_published" class="ml-2 block text-sm text-gray-900">
                            Publicar inmediatamente
                        </label>
                    </div>

                    <div class="flex items-center justify-between pt-4 border-t border-gray-100">
                        <a href="{{ url_for('announcements.index') }}" 
                            class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                            <i class="fas fa-times mr-2"></i> Cancelar
                        </a>
                        <button type="submit" 
                            class="inline-flex items-center px-6 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors shadow-sm">
                            <i class="fas fa-save mr-2"></i> Crear Anuncio
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Script para inicializar Quill -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Configuración del toolbar con todas las opciones básicas
    const toolbarOptions = [
        ['bold', 'italic', 'underline', 'strike'],        // negrita, cursiva, subrayado, tachado
        ['blockquote', 'code-block'],                     // cita, bloque de código
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],     // lista numerada, lista con viñetas
        [{ 'script': 'sub'}, { 'script': 'super' }],      // subíndice, superíndice
        [{ 'indent': '-1'}, { 'indent': '+1' }],          // disminuir aumentar sangría
        [{ 'size': ['small', false, 'large', 'huge'] }],  // tamaño de fuente
        [{ 'header': [1, 2, 3, 4, 5, 6, false] }],        // encabezados
        [{ 'color': [] }, { 'background': [] }],          // color de texto y fondo
        [{ 'align': [] }],                                // alineación
        ['clean']                                         // limpiar formato
    ];

    // Inicializar Quill
    const quill = new Quill('#editor-container', {
        theme: 'snow',
        placeholder: 'Describe los detalles del anuncio...',
        modules: {
            toolbar: toolbarOptions
        }
    });

    // Sincronizar contenido al enviar el formulario
    const form = document.getElementById('announcement-form');
    const contentInput = document.getElementById('content-input');

    form.addEventListener('submit', function(e) {
        // Obtener el contenido HTML del editor
        const htmlContent = quill.root.innerHTML;
        contentInput.value = htmlContent;

        // Validar que no esté vacío (solo etiquetas HTML vacías)
        const textContent = quill.getText().trim();
        if (textContent.length === 0) {
            e.preventDefault();
            alert('El contenido no puede estar vacío');
            quill.focus();
            return false;
        }
    });
});
</script>

<style>
/* Estilos personalizados para el editor */
#editor-container {
    min-height: 250px;
}
.ql-editor {
    min-height: 250px;
    font-size: 16px;
    line-height: 1.5;
}
.ql-toolbar {
    border-radius: 0.375rem 0.375rem 0 0;
    background-color: #f9fafb;
    border-color: #d1d5db;
}
#editor-container {
    border-radius: 0 0 0.375rem 0.375rem;
    border-top: none;
}
/* Ajustar estilos de los botones del toolbar para que combinen con Tailwind */
.ql-toolbar button:hover {
    background-color: #e5e7eb;
}
.ql-toolbar .ql-picker-label:hover,
.ql-toolbar .ql-picker-item:hover {
    color: #4f46e5;
}
.ql-toolbar .ql-stroke {
    stroke: #374151;
}
.ql-toolbar .ql-fill {
    fill: #374151;
}
</style>
{% endblock %}
